# TODO: deploy from tag
version: 2.1

orbs:
  linter: talkiq/linter@4.0.1

executors:
  python:
    docker:
      - image: python:3.13.11
    resource_class: medium

workflows:
  run-jobs:
    jobs:
      - linter/pre-commit:
          executor: python
          pre-steps:
            - run: apt-get update -y
            - run: apt-get install --no-install-recommends -y bison
